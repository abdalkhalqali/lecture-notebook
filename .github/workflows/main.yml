name: 🎓 Build & Send to Telegram

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps
        env:
          CI: false

      - name: 🔧 Fix Metro Config for Web
        run: |
          cat > metro.config.js << 'EOF'
          const { getDefaultConfig } = require('expo/metro-config');
          const config = getDefaultConfig(__dirname);
          config.resolver.platforms = [...config.resolver.platforms, 'web'];
          config.watchFolders = [];
          config.resolver.blockList = [/.local\/.*/];
          module.exports = config;
          EOF

      - name: 🌐 Build Web
        run: npm run build:web
        env:
          CI: false
          EXPO_NO_TELEMETRY: 1

      - name: 🗜️ Zip Web
        run: |
          zip -r lecture-notebook-web.zip dist/
          echo "WEB_SIZE=$(du -h lecture-notebook-web.zip | cut -f1)" >> $GITHUB_ENV
          echo "COMMIT=$(git log --oneline -1 | cut -c1-60)" >> $GITHUB_ENV
          echo "BUILD_TIME=$(date '+%Y-%m-%d %H:%M')" >> $GITHUB_ENV

      - name: 📤 Send Web to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument" \
            -F "chat_id=${CHAT_ID}" \
            -F "document=@lecture-notebook-web.zip" \
            -F "caption=🌐 نسخة الويب جاهزة%0A📝 ${{ env.COMMIT }}%0A🕐 ${{ env.BUILD_TIME }}%0A📦 ${{ env.WEB_SIZE }}"

      - name: ❌ Notify Failure
        if: failure()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${CHAT_ID}\",
              \"parse_mode\": \"HTML\",
              \"text\": \"❌ <b>فشل بناء الويب</b>\n🔗 <a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>عرض الخطأ</a>\"
            }"
